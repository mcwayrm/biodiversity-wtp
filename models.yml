fe_ER:
  model_vars:
    - expected_richness
    - migrant_richness
    - resident_richness
    - shannon_index
    - simpson_index
    - expected_congestion
    - precip
    - temp
    - trees
    - travel_cost_combined
    - dist_to_pa_km
  fe_vars:
    - cluster_id
    - season
  mixed_vars:
    - skip
  sample: 0.01
mixed_ER:
  model_vars:
    - expected_richness
    - migrant_richness
    - resident_richness
    - shannon_index
    - simpson_index
    - expected_congestion
    - precip
    - temp
    - trees
    - travel_cost_combined
    - dist_to_pa_km
  fe_vars:
    - [user_id, year]
    - [cluster_id, season]
  mixed_vars:
    - expected_richness
  sample: 0.01
